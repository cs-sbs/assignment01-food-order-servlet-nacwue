<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Order System</title>
</head>
<body>
<h2>View Menu</h2>
<ul>
    <li><a href="/menu" target="_blank">View All Menu</a></li>
    <li><a href="/menu?name=Fried" target="_blank">Search 'Fried'</a></li>
</ul>

<hr>

<h2>Create Food Order</h2>
<form action="/order" method="post">
    Customer Name: <input type="text" name="customer"><br><br>
    Food Name: <input type="text" name="food"><br><br>
    Quantity: <input type="number" name="quantity"><br><br>
    <input type="submit" value="Place Order">
</form>

<hr>

<h2>Check Order Detail</h2>
<p>After creating an order, click the link below to verify (assume ID 1001):</p>
<a href="/order/1001" target="_blank">Order #1001 (Click to view details)</a>
</body>
</html>
